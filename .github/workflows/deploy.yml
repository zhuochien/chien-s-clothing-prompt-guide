name: Build & Deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache images
        uses: actions/cache@v4
        with:
          path: dist/img
          key: images-cache-v1
      - name: Install dependencies
        run: npm install
      - name: Build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_ARCHIVES:  ${{ secrets.DB_ARCHIVES }}
          DB_ATELIER:   ${{ secrets.DB_ATELIER }}
          DB_SALON:     ${{ secrets.DB_SALON }}
          DB_OUTFITS:   ${{ secrets.DB_OUTFITS }}
        run: npm run build
      - name: Copy assets
        run: cp -r assets dist/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
